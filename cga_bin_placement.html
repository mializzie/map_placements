<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bin Placement Tool</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 20px;
    display: flex;
    gap: 20px;
}

/* LEFT PANEL */
#sidebar{
    width: 280px;
}

.sidebar-section{
    margin-bottom: 20px;
}

select, button{
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

/* MAP AREA */
#map-container{
    position: relative;
    border: 1px solid #ccc;
    display: inline-block;
    flex: 1;
    overflow: auto;
}

#map-image{
    display: block;
    max-width: 100%;
}

/* BIN DOTS */
.bin{
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
}

.Soap{ background: #f39c12; }
.Edibles{ background: #27ae60; }
.Warehouse{ background: #2980b9; }
.Admin{ background: #8e44ad; }
.Other{ background: #7f8c8d; }

.summary-table{
    width: 100%;
    border-collapse: collapse;
}

.summary-table th,
.summary-table td{
    border: 1px solid #ccc;
    padding: 4px;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

    <div class="sidebar-section">
        <h4>Load Layout Map</h4>
        <input type="file" id="mapUpload" accept="image/*">
        <p style="font-size:12px;color:#666;">
            Or place file in: assets/maps/layout.png
        </p>
    </div>

    <div class="sidebar-section">
        <h4>Next Bin Type</h4>
        <select id="next-dept">
            <option value="Soap">Soap / Detergent</option>
            <option value="Edibles">Edibles</option>
            <option value="Warehouse">Warehouse</option>
            <option value="Admin">Admin / Kitchen</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div class="sidebar-section">
        <h4>Summary</h4>
        <table class="summary-table">
            <thead>
                <tr><th>Dept</th><th>Count</th></tr>
            </thead>
            <tbody id="summary-body"></tbody>
        </table>
    </div>

</div>

<!-- MAP -->
<div id="map-container">
    <img id="map-image">
</div>

<script>
// ─── LAYOUT MAP (NO EMBEDDED IMAGES) ────────────────────────────────
const MAPS = {
    layout: "assets/maps/layout.png"
};

const mapImage = document.getElementById("map-image");
const mapContainer = document.getElementById("map-container");
const mapUpload = document.getElementById("mapUpload");

// Load default layout
mapImage.src = MAPS.layout;

// Optional upload override
mapUpload.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
        mapImage.src = event.target.result;
    };
    reader.readAsDataURL(file);
});

// Place bins on click
mapContainer.addEventListener("click", (e) => {
    if (!mapImage.src) return;

    const rect = mapContainer.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const type = document.getElementById("next-dept").value;

    const bin = document.createElement("div");
    bin.classList.add("bin", type);

    bin.style.left = x + "px";
    bin.style.top = y + "px";

    // remove bin on double click
    bin.addEventListener("dblclick", () => {
        bin.remove();
    });

    mapContainer.appendChild(bin);

    updateSummary();
});

// Summary updater
function updateSummary(){
    const counts = {};

    document.querySelectorAll(".bin").forEach(bin => {
        const type = bin.classList[1];
        counts[type] = (counts[type] || 0) + 1;
    });

    const tbody = document.getElementById("summary-body");
    tbody.innerHTML = "";

    Object.keys(counts).forEach(key => {
        const row = document.createElement("tr");
        row.innerHTML = `<td>${key}</td><td>${counts[key]}</td>`;
        tbody.appendChild(row);
    });
}
</script>

</body>
</html>
