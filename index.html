<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bin Placement Tool</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 20px;
    display: flex;
    gap: 20px;
}

#sidebar{
    width: 260px;
}

#map-container{
    position: relative;
    border: 1px solid #ccc;
    display: inline-block;
}

#map-container img{
    display: block;
    max-width: 100%;
}

.bin{
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: bold;
    color: white;
    user-select: none;
}

.P{ background:#1565C0; } /* Plastic */
.C{ background:#E65100; } /* Cardboard */

button, select, input{
    width: 100%;
    padding: 6px;
    margin-top: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

    <h3>Bin Tool</h3>

    <!-- MODE SELECT -->
    <select id="mode">
        <option value="P">Plastic Bin (P)</option>
        <option value="C">Cardboard Bin (C)</option>
        <option value="DELETE">Delete Mode</option>
    </select>

    <!-- UPLOAD MAP -->
    <h4>Upload Map</h4>
    <input type="file" id="mapUpload" accept="image/*">

    <button onclick="clearAll()">Clear All</button>

</div>

<!-- MAP -->
<div id="map-container">
    <img id="map" src="assets/maps/layout.png" alt="Layout Map">
</div>

<script>
const container = document.getElementById("map-container");
const map = document.getElementById("map");
const modeSelect = document.getElementById("mode");
const mapUpload = document.getElementById("mapUpload");

let bins = [];

/* PLACE BIN */
container.addEventListener("click", (e) => {

    if(!map.src) return;

    const mode = modeSelect.value;
    if(mode === "DELETE") return;

    const rect = container.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    bins.push({
        id: Date.now(),
        type: mode,
        x,
        y
    });

    renderBins();
});

/* UPLOAD MAP IMAGE */
mapUpload.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = (event) => {
        map.src = event.target.result;
    };

    reader.readAsDataURL(file);
});

/* RENDER BINS */
function renderBins(){

    document.querySelectorAll(".bin").forEach(b => b.remove());

    bins.forEach(b => {
        const el = document.createElement("div");

        el.classList.add("bin", b.type);
        el.style.left = b.x + "px";
        el.style.top = b.y + "px";
        el.textContent = b.type;

        el.addEventListener("click", (e) => {
            e.stopPropagation();

            if(modeSelect.value === "DELETE"){
                bins = bins.filter(x => x.id !== b.id);
                renderBins();
            }
        });

        container.appendChild(el);
    });
}

/* CLEAR ALL */
function clearAll(){
    bins = [];
    renderBins();
}
</script>

</body>
</html>
